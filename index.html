<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calcolatrice">
        <p>Usami se hai il coraggio</p>
        <input type="text" id="display" readonly value="0">
        <div class="tasti">
            <button class="btn-canc1">C</button>
            <button class="btn-canc">CE</button>
            <button class="btn-punto">.</button>
            <button class="btn-diviso">/</button>
            <button class="btn-numero">9</button>
            <button class="btn-numero">8</button>
            <button class="btn-numero">7</button>
            <button class="btn-per">x</button>
            <button class="btn-numero">6</button>
            <button class="btn-numero">5</button>
            <button class="btn-numero">4</button>
            <button class="btn-meno">-</button>
            <button class="btn-numero">3</button>
            <button class="btn-numero">2</button>
            <button class="btn-numero">1</button>
            <button class="btn-piu">+</button>
            <button class="btn-numero" style="grid-column: span 2;">0</button>
            <button class="btn-numero">.</button>
            <button class="btn-uguale">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
